      pattern: ["cycle", "pattern", "recurring", "repetitive"],
    };

    function findRelatedEvents(eventId, eventTitle, eventBody) {
      const currentEvent = events.find(e => e.id === eventId);
      if (!currentEvent) return [];

      const related = [];
      const titleLower = eventTitle.toLowerCase();
      const bodyLower = eventBody.toLowerCase();

      events.forEach(e => {
        if (e.id === eventId) return; // Skip self

        let score = 0;
        const eTitleLower = e.title.toLowerCase();
        const eBodyLower = e.body.toLowerCase();

        // Check for keyword matches
        Object.entries(KEYWORDS).forEach(([key, words]) => {
          words.forEach(word => {
            if ((titleLower.includes(word) || bodyLower.includes(word)) &&
                (eTitleLower.includes(word) || eBodyLower.includes(word))) {
              score += 3;
            }
          });
        });

        // Check for same category
        if (e.category === currentEvent.category) {
          score += 1;
        }

        // Check for temporal proximity (within 1 year)
        const yearDiff = Math.abs(parseInt(e.year) - parseInt(currentEvent.year));
        if (yearDiff === 0) score += 2;
        if (yearDiff === 1) score += 1;

        // Check for direct mentions
        if (eTitleLower.includes(eventTitle.substring(0, 20).toLowerCase().replace(/[^a-z0-9]/g, ""))) {
          score += 5;
        }

        if (score > 0) {
          related.push({ ...e, score });
        }
      });

      return related.sort((a, b) => b.score - a.score).slice(0, 5);
    }

                                            handleRelatedClick(related.id);
                                          }}
                                          style={{
                                            display: "inline-flex",
                                            alignItems: "center",
                                            gap: 5,
                                            padding: "4px 10px",
                                            background: "transparent",
                                            border: `1.5px solid ${relCat.color}66`,
                                            borderRadius: 16,
                                            color: relCat.color,
                                            fontSize: 11,
                                            fontFamily: "Georgia, serif",
                                            cursor: "pointer",
                                            transition: "all 0.15s ease",
                                            fontWeight: 500,
                                          }}
                                          onMouseEnter={(e) => {
                                            e.currentTarget.style.borderColor = relCat.color + "cc";
                                            e.currentTarget.style.background = relCat.bg;
                                            e.currentTarget.style.boxShadow = `0 0 8px ${relCat.color}33`;
                                          }}
                                          onMouseLeave={(e) => {
                                            e.currentTarget.style.borderColor = relCat.color + "66";
                                            e.currentTarget.style.background = "transparent";
                                            e.currentTarget.style.boxShadow = "none";
                                          }}
                                        >
                                          <span style={{ fontSize: 9, opacity: 0.8 }}>
                                            {related.period}
                                          </span>
                                          <span style={{ fontSize: 9, opacity: 0.6 }}>•</span>
                                          <span style={{ fontWeight: 600 }}>
                                            {related.title.substring(0, 35).replace(/—.*/, "").trim()}
                                            {related.title.length > 35 ? "…" : ""}
                                          </span>
                                        </button>
                                      );
                                    })}
                                  </div>
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>

          {/* Footer */}
          <div style={{
            maxWidth: 860, margin: "0 auto",
            padding: printMode ? "20px 0 0" : "0 40px 60px",
            borderTop: printMode ? "1px solid #ccc" : "1px solid #1e1c18",
            paddingTop: printMode ? 20 : 32,
          }}>
            <p style={{ fontSize: 11, color: printMode ? "#888" : "#3a3530", fontStyle: "italic", lineHeight: 1.6 }}>
              This document is confidential and intended solely for use in clinical therapy sessions. It represents a collaborative personal account and does not constitute a complete or legally binding [...]
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
